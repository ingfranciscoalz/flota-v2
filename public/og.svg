  <rect x="1000" y="425" width="80" height="26" rx="13" fill="#1A0A0A" stroke="#3A1010" stroke-width="1"/>
  <text x="1040" y="442" font-family="Arial, sans-serif" font-size="10" font-weight="700" fill="#EF4444" text-anchor="middle">⚠ CAMBIAR</text>

  <!-- Punto azul decorativo -->
