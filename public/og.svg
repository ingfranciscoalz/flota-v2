  <text x="982" y="340" font-family="Arial, sans-serif" font-size="16" font-weight="600" fill="#FFFFFF">48.230</text>

  <!-- Mini mantenimiento -->
  <rect x="824" y="362" width="272" height="44" rx="10" fill="#161616"/>
  <text x="840" y="384" font-family="Arial, sans-serif" font-size="12" fill="#CCCCCC">Aceite y filtros</text>
