  <!-- FLOTA. -->
  <text x="80" y="290" font-family="Arial Black, Helvetica, sans-serif" font-weight="900" font-size="148" fill="#FFFFFF" letter-spacing="-6">FLOTA<tspan fill="#276EF1">.</tspan></text>

  <!-- Tagline -->
  <text x="86" y="350" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="400" fill="#444" letter-spacing="4">GESTIÓN DE FLOTA DE REMISES</text>

  <!-- Pills de features -->
  <rect x="82" y="388" width="116" height="34" rx="17" fill="#091428"/>
