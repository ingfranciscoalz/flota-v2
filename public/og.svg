  <text x="840" y="248" font-family="Arial, sans-serif" font-size="9" fill="#555" letter-spacing="1">NETO DEL MES</text>
  <text x="1080" y="264" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#276EF1" text-anchor="end">$171.900</text>

