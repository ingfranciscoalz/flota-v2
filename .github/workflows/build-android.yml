name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Generate keystore
        working-directory: twa
        run: |
          keytool -genkeypair -v \
            -keystore android-key.keystore -alias flota \
            -keyalg RSA -keysize 2048 -validity 9125 \
            -dname "CN=Flota App, O=Flota, C=AR" \
            -storepass flotaapp2024 -keypass flotaapp2024

      - name: Get SHA-256 fingerprint
        id: fp
        working-directory: twa
        run: |
          FP=$(keytool -list -v -keystore android-key.keystore \
            -alias flota -storepass flotaapp2024 2>/dev/null \
            | grep "SHA256:" | awk '{print $2}')
          echo "sha256=$FP" >> $GITHUB_OUTPUT
          echo "Fingerprint: $FP"

      - name: Generate Android project
        working-directory: twa
        run: node gen-android.cjs

      - name: Download launcher icon
        working-directory: twa/android/app/src/main/res
        run: |
          for dpi in mdpi hdpi xhdpi xxhdpi xxxhdpi; do
            mkdir -p mipmap-$dpi
            curl -sL https://flota-v2.vercel.app/icons/icon-512.png \
              -o mipmap-$dpi/ic_launcher.png
          done

      - name: Build APK
        working-directory: twa/android
        env:
          KEYSTORE_PATH: ../android-key.keystore
          KEYSTORE_PASSWORD: flotaapp2024
          KEY_PASSWORD: flotaapp2024
        run: ./gradlew assembleRelease --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: flota-android-apk
          path: twa/android/app/build/outputs/apk/release/*.apk
          retention-days: 30

      - name: Summary
        run: |
          echo "## ✅ APK generado" >> $GITHUB_STEP_SUMMARY
          echo "**SHA-256:** \`${{ steps.fp.outputs.sha256 }}\`" >> $GITHUB_STEP_SUMMARY
          echo "Descargá el APK desde Artifacts." >> $GITHUB_STEP_SUMMARY
        with:
          name: flota-android-apk
          path: twa/*.apk
          retention-days: 30

      - name: Summary
        run: |
          echo "## ✅ APK generado" >> $GITHUB_STEP_SUMMARY
          echo "**SHA-256:** \`${{ steps.fp.outputs.sha256 }}\`" >> $GITHUB_STEP_SUMMARY
          echo "Descargá el APK desde Artifacts." >> $GITHUB_STEP_SUMMARY
