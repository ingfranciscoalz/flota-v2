name: Build Android AAB

on:
  workflow_dispatch:   # Solo se ejecuta manualmente desde la pestaña Actions

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > twa/android-key.keystore

      - name: Make gradlew executable
        run: chmod +x twa/android/gradlew

      - name: Build release AAB
        working-directory: twa/android
        env:
          KEYSTORE_PATH: ../android-key.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        run: ./gradlew bundleRelease --no-daemon

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: flota-release
          path: twa/android/app/build/outputs/bundle/release/app-release.aab
          retention-days: 7
